apiVersion: v1
kind: Service
metadata:
  name: mcp-tls-server
  namespace: mcp-test
spec:
  selector:
    app: mcp-tls-server
  ports:
  - name: https
    port: 8443
    targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-tls-server
  namespace: mcp-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-tls-server
  template:
    metadata:
      labels:
        app: mcp-tls-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
      - name: mcp-tls-server
        image: ghcr.io/kuadrant/mcp-gateway/test-tls-server:latest
        imagePullPolicy: Never
        args:
        - "--http"
        - ":8443"
        - "--tls-cert"
        - "/etc/tls/tls.crt"
        - "--tls-key"
        - "/etc/tls/tls.key"
        - "--health"
        - ":8080"
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: health
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        resources:
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: tls
        secret:
          secretName: tls-test-server-tls
